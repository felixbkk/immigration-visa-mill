let rawData = null;
let overlayLinks = [];
let currentLayout = 'tree';
let nodePositions = {};
let currentRootData = null;
let currentUpdateFn = null;
let selectedLeafId = null;
let currentSvg = null;
let currentZoom = null;

// ── Data Loading ──

d3.json('visa_data.json').then(data => {
  rawData = data;
  currentRootData = null; // force fresh hierarchy build
  buildLegend();
  render();
});

// ── Transform flat data → hierarchy ──

function transformToHierarchy(data) {
  const groups = { NIV: {}, IV: {} };
  const overlays = [];

  for (const node of data.nodes) {
    const g = node.group;
    const cat = node.category;
    const sub = node.subcategory;
    if (!groups[g]) groups[g] = {};
    if (!groups[g][cat]) groups[g][cat] = {};
    if (!groups[g][cat][sub]) groups[g][cat][sub] = [];
    groups[g][cat][sub].push(node);
  }

  const rootChildren = [];
  for (const grp of ['NIV', 'IV']) {
    const catChildren = [];
    for (const cat of Object.keys(groups[grp]).sort()) {
      const subChildren = [];
      for (const sub of Object.keys(groups[grp][cat]).sort()) {
        const allLeaves = groups[grp][cat][sub]
          .sort((a, b) => a.id.localeCompare(b.id));

        const leafIds = new Set(allLeaves.map(n => n.id));

        // Find internal links (both source and target in this subcategory)
        const internalLinks = data.links.filter(l =>
          leafIds.has(l.source) && leafIds.has(l.target)
        );

        let subKids;

        if (internalLinks.length === 0) {
          // No internal connections — all leaves stay flat
          subKids = allLeaves.map(n => ({
            name: n.id,
            nodeData: n,
            _children: null,
            children: null,
          }));
        } else {
          // Link-based clustering
          const inbound = new Set(internalLinks.map(l => l.target));
          const outbound = new Set(internalLinks.map(l => l.source));

          // Principals: have outbound but no inbound (within subcategory)
          const principals = allLeaves.filter(n =>
            outbound.has(n.id) && !inbound.has(n.id)
          );

          // Build cluster for each principal
          const assigned = new Set(); // track which derivatives are already assigned
          const clusters = [];

          for (const principal of principals.sort((a, b) => a.id.localeCompare(b.id))) {
            // Find direct derivatives of this principal within the subcategory
            const derivativeIds = internalLinks
              .filter(l => l.source === principal.id && leafIds.has(l.target))
              .map(l => l.target);

            const clusterLeaves = [principal];
            for (const did of derivativeIds) {
              if (!assigned.has(did)) {
                const dNode = allLeaves.find(n => n.id === did);
                if (dNode) {
                  clusterLeaves.push(dNode);
                  assigned.add(did);
                }
              }
            }
            assigned.add(principal.id);

            if (clusterLeaves.length === 1) {
              // Principal with no unassigned derivatives — stays flat
              clusters.push({
                name: principal.id,
                nodeData: principal,
                _children: null,
                children: null,
              });
            } else {
              // Principal IS the intermediate — derivatives are its children
              const derivOnly = clusterLeaves.filter(n => n.id !== principal.id);
              clusters.push({
                name: principal.id,
                nodeData: principal,
                _nodeType: 'principal',
                _category: cat,
                children: null,
                _children: derivOnly.map(n => ({
                  name: n.id,
                  nodeData: n,
                  _children: null,
                  children: null,
                })),
              });
            }
          }

          // Orphans: not assigned to any cluster
          const orphans = allLeaves
            .filter(n => !assigned.has(n.id))
            .map(n => ({
              name: n.id,
              nodeData: n,
              _children: null,
              children: null,
            }));

          subKids = [...clusters, ...orphans];
        }

        subChildren.push({
          name: sub,
          _nodeType: 'subcategory',
          _category: cat,
          children: null,
          _children: subKids,
        });
      }
      catChildren.push({
        name: cat.replace(`${grp} — `, ''),
        _fullCategory: cat,
        _nodeType: 'category',
        children: null,
        _children: subChildren,
      });
    }
    rootChildren.push({
      name: grp,
      _nodeType: 'hub',
      children: catChildren,
      _children: catChildren,
    });
  }

  // Identify overlay links (all links become overlays since tree uses hierarchy)
  for (const link of data.links) {
    overlays.push({
      source: link.source,
      target: link.target,
      type: link.relation_type,
      label: link.label,
    });
  }

  return {
    root: {
      name: 'INA',
      _nodeType: 'root',
      _fullName: 'Immigration & Nationality Act',
      _subtitle: '8 U.S.C. §1101 et seq.',
      children: rootChildren,
    },
    overlays,
  };
}

// ── Rendering ──

function render() {
  const container = document.getElementById('canvas-container');
  const w = container.clientWidth;
  const h = container.clientHeight;

  const svg = d3.select('#viz')
    .attr('viewBox', null)
    .html('');

  const g = svg.append('g').attr('class', 'zoomable');

  const zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  currentSvg = svg;
  currentZoom = zoom;

  // Always rebuild hierarchy fresh (preserving expand/collapse state via currentRootData)
  const freshResult = transformToHierarchy(rawData);
  if (!currentRootData) {
    currentRootData = freshResult.root;
  }
  overlayLinks = freshResult.overlays;

  const root = d3.hierarchy(currentRootData);

  if (currentLayout === 'tree') {
    renderTree(g, root, w, h, svg, zoom);
  } else {
    renderRadial(g, root, w, h, svg, zoom);
  }
}

function getNodeColor(d) {
  if (d.data._nodeType === 'root') return '#e0e0e0';
  if (d.data._nodeType === 'hub') return HUB_COLORS[d.data.name] || '#fff';
  if (d.data._nodeType === 'category') return COLORS[d.data._fullCategory] || '#888';
  if (d.data._nodeType === 'subcategory') return COLORS[d.data._category] || '#888';
  if (d.data._nodeType === 'intermediate' || d.data._nodeType === 'principal') return COLORS[d.data._category] || '#888';
  if (d.data.nodeData) {
    return COLORS[d.data.nodeData.category] || '#888';
  }
  return '#888';
}

function getNodeRadius(d) {
  if (d.data._nodeType === 'root') return 18;
  if (d.data._nodeType === 'hub') return 14;
  if (d.data._nodeType === 'category') return 10;
  if (d.data._nodeType === 'subcategory') return 7;
  return 5;
}

function hasChildren(d) {
  return d.data._children && d.data._children.length > 0;
}

function toggleNode(d, root) {
  if (d.data._nodeType === 'hub') return;

  // Accordion: only one node open at a time per level
  // (skipped when expandAll is active)
  if (!window._expandAllActive && !d.data.children && d.data._children) {
    // Close ALL other open nodes at the same depth
    collapseAllExcept(root.data, d.data);
  }

  if (d.data.children) {
    d.data._children = d.data.children;
    d.data.children = null;
  } else if (d.data._children) {
    d.data.children = d.data._children;
  }
}

function findParentData(rootData, targetData) {
  const children = rootData.children || rootData._children || [];
  for (const child of children) {
    if (child === targetData) return rootData;
    const found = findParentData(child, targetData);
    if (found) return found;
  }
  return null;
}

function collapseAllExcept(rootData, keep) {
  // Find the depth of the node being opened
  const keepType = keep._nodeType;

  // Walk the tree and close siblings + cousins at the same level
  // But leave ancestors open so we can see the path
  _collapseSiblings(rootData, keep);
}

function _collapseSiblings(node, keep) {
  const kids = node.children || [];
  for (const child of kids) {
    if (child === keep) continue;

    // Collapse this sibling if it's at the same level
    if (child._nodeType === keep._nodeType && child.children) {
      // First collapse all descendants inside it
      _collapseDeep(child);
      child._children = child.children;
      child.children = null;
    }

    _collapseSiblings(child, keep);
  }
}

function _collapseDeep(node) {
  const kids = node.children || [];
  for (const child of kids) {
    _collapseDeep(child);
    if (child.children && child._nodeType !== 'hub' && child._nodeType !== 'root') {
      child._children = child.children;
      child.children = null;
    }
  }
}

// ── Color Helpers ──

function blendWithBg(hex, amount) {
  // Blend a hex color with the background (#1a1a2e) at given amount
  const bg = { r: 0x1a, g: 0x1a, b: 0x2e };
  const c = hexToRgb(hex);
  const r = Math.round(bg.r + (c.r - bg.r) * amount);
  const g = Math.round(bg.g + (c.g - bg.g) * amount);
  const b = Math.round(bg.b + (c.b - bg.b) * amount);
  return `rgb(${r},${g},${b})`;
}

function hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return {
    r: parseInt(hex.slice(0, 2), 16),
    g: parseInt(hex.slice(2, 4), 16),
    b: parseInt(hex.slice(4, 6), 16),
  };
}

// ── Label Helpers ──

function getMainLabel(d) {
  if (d.data._nodeType === 'root') return 'INA';
  if (d.data._nodeType === 'hub') return d.data.name;
  if (d.data._nodeType === 'category') {
    return d.data.name;
  }
  if (d.data._nodeType === 'subcategory') {
    const fullName = SUBCATEGORY_NAMES[d.data.name] || '';
    return `${d.data.name} — ${fullName}`;
  }
  if (d.data._nodeType === 'intermediate') {
    return d.data.name;
  }
  if (d.data._nodeType === 'principal') {
    const nd = d.data.nodeData;
    if (nd) return `${nd.id} — ${nd.name}`;
    return d.data.name;
  }
  // Leaf node
  const nd = d.data.nodeData;
  if (nd) return `${nd.id} — ${nd.name}`;
  return d.data.name;
}

function getSubtitle(d) {
  if (d.data._nodeType === 'root') return 'Immigration & Nationality Act · 8 U.S.C. §1101 et seq.';
  if (d.data._nodeType === 'hub') {
    return d.data.name === 'NIV'
      ? 'Nonimmigrant Visas · INA §101(a)(15)'
      : 'Immigrant Visas · INA §201–203';
  }
  if (d.data._nodeType === 'category') {
    return CATEGORY_DESCRIPTIONS[d.data._fullCategory] || '';
  }
  if (d.data._nodeType === 'subcategory') return null;
  if (d.data._nodeType === 'intermediate') return null;
  if (d.data._nodeType === 'principal') {
    const nd = d.data.nodeData;
    return nd ? nd.law : null;
  }
  // Leaf: show law citation
  const nd = d.data.nodeData;
  if (nd) return nd.law;
  return null;
}

// ── Tree Layout ──

function renderTree(g, root, w, h, svg, zoom) {
  const treeLayout = d3.tree().nodeSize([20, 100]).separation((a, b) => {
    // Bigger nodes get more space
    const aH = getNodeHeight(a);
    const bH = getNodeHeight(b);
    const needed = (aH + bH) / 2 + 8; // 8px gap
    return needed / 20; // normalize to nodeSize unit
  });

  function getNodeHeight(d) {
    const type = d.data._nodeType;
    // Estimated rendered height: text lines + padding (padY=10 top+bottom)
    // Title ~15px + subtitle ~11px + padY*2=20 + gap 4px
    if (type === 'root') return 56;
    if (type === 'hub') return 52;
    if (type === 'category') return 54;
    if (type === 'subcategory') return 44;
    if (type === 'intermediate' || type === 'principal') return 48;
    return 48; // leaf: long title + law citation subtitle + padding
  }

  function update(source) {
    const freshRoot = d3.hierarchy(root.data);
    treeLayout(freshRoot);

    const nodes = freshRoot.descendants();
    const links = freshRoot.links();
    const dur = 500;

    const boxWidths = new Map();

    // ── Pre-measure: render hidden text to get widths per node ──
    const measureG = g.append('g').attr('class', 'measure-tmp').style('visibility', 'hidden');
    nodes.forEach(d => {
      const mg = measureG.append('g');
      const main = mg.append('text')
        .attr('class', 'node-label')
        .attr('font-size', d.data._nodeType === 'category' || d.data._nodeType === 'hub' ? '15px' : d.data._nodeType === 'subcategory' ? '13px' : '12px')
        .text(getMainLabel(d));
      const sub = mg.append('text')
        .attr('class', 'node-subtitle')
        .attr('font-size', '10px')
        .text(getSubtitle(d) || '');
      const mw = Math.max(main.node().getComputedTextLength(), sub.node().getComputedTextLength());
      const padL = 10, padR = 24;
      boxWidths.set(d, mw + padL + padR);
    });
    measureG.remove();

    // ── Reposition nodes: each depth level starts after the widest box at the previous depth ──
    const hGap = 30;
    const maxWidthAtDepth = {};
    nodes.forEach(d => {
      const depth = d.depth;
      const w = boxWidths.get(d) || 100;
      if (!maxWidthAtDepth[depth] || w > maxWidthAtDepth[depth]) {
        maxWidthAtDepth[depth] = w;
      }
    });

    // Compute cumulative x position per depth
    const depthX = { 0: 0 };
    const maxDepth = Math.max(...Object.keys(maxWidthAtDepth).map(Number));
    for (let i = 1; i <= maxDepth; i++) {
      depthX[i] = depthX[i - 1] + (maxWidthAtDepth[i - 1] || 100) + hGap;
    }

    nodes.forEach(d => {
      d.y = depthX[d.depth] || 0;
    });

    // Add fixed vertical gap between NIV and IV
    const ivNodes = nodes.filter(d => {
      let n = d;
      while (n.parent) {
        if (n.data._nodeType === 'hub' && n.data.name === 'IV') return true;
        n = n.parent;
      }
      return d.data._nodeType === 'hub' && d.data.name === 'IV';
    });
    ivNodes.forEach(d => { d.x += 80; });

    nodePositions = {};
    nodes.forEach(d => {
      if (d.data.nodeData) nodePositions[d.data.nodeData.id] = { x: d.y, y: d.x };
    });

    // ── Nodes ──
    g.selectAll('.node').remove();
    g.selectAll('.link').remove();

    const nodeGroups = g.selectAll('.node')
      .data(nodes, d => d.data.name + '|' + (d.parent ? d.parent.data.name : ''))
      .join('g')
      .attr('class', d => {
        const isSelected = (d.data.nodeData && d.data.nodeData.id === selectedLeafId) ||
          (d.data._nodeType === 'principal' && d.data.nodeData && d.data.nodeData.id === selectedLeafId);
        return isSelected ? 'node node-selected' : 'node';
      })
      .attr('transform', d => `translate(${d.y},${d.x})`)
      .style('cursor', 'pointer')
      .on('click', (event, d) => {
        event.stopPropagation();
        if (d.data._nodeType === 'principal') {
          // Principal: show its own detail AND expand/collapse children
          selectedLeafId = d.data.nodeData.id;
          showDetail(d.data.nodeData);
          toggleNode(d, freshRoot);
          update(d);
          return;
        }
        if (d.data.nodeData) {
          selectedLeafId = d.data.nodeData.id;
          showDetail(d.data.nodeData);
          update(d);
          return;
        }
        selectedLeafId = null;
        showCategoryDetail(d);
        if (d.data._nodeType !== 'root') {
          toggleNode(d, freshRoot);
          update(d);
        }
      });

    // Render text first so we can measure it
    const mainTexts = nodeGroups.append('text')
      .attr('class', d => {
        if (d.data._nodeType === 'category' || d.data._nodeType === 'hub')
          return 'node-label node-label-category';
        if (d.data._nodeType === 'subcategory' || d.data._nodeType === 'intermediate')
          return 'node-label node-label-subcategory';
        if (d.data._nodeType === 'principal')
          return 'node-label node-label-leaf';
        return 'node-label node-label-leaf';
      })
      .attr('dy', d => getSubtitle(d) ? '-0.2em' : '0.35em')
      .attr('text-anchor', 'start')
      .attr('x', 0)
      .text(d => getMainLabel(d));

    const subTexts = nodeGroups.append('text')
      .attr('class', 'node-subtitle')
      .attr('dy', '1.15em')
      .attr('text-anchor', 'start')
      .attr('x', 0)
      .text(d => getSubtitle(d) || '');

    // Measure text and create boxes around them
    nodeGroups.each(function(d) {
      const group = d3.select(this);
      const mainEl = group.select('.node-label').node();
      const subEl = group.select('.node-subtitle').node();

      // Get the combined bounding box of all text in the group
      const mainBox = mainEl.getBBox();
      const subBox = subEl.getBBox();
      const hasSub = getSubtitle(d);

      // Use the actual rendered bounding boxes including dy offsets
      let totalTop, totalBottom;
      if (hasSub) {
        totalTop = Math.min(mainBox.y, subBox.y);
        totalBottom = Math.max(mainBox.y + mainBox.height, subBox.y + subBox.height);
      } else {
        totalTop = mainBox.y;
        totalBottom = mainBox.y + mainBox.height;
      }
      const tw = Math.max(mainBox.width, hasSub ? subBox.width : 0);
      const th = totalBottom - totalTop;

      const padL = 10;
      const padR = 24;
      const padY = 10;
      const rectW = tw + padL + padR;
      const rectH = th + padY * 2;
      const rectY = totalTop - padY;

      const textX = padL;

      group.insert('rect', ':first-child')
        .attr('class', 'node-box')
        .attr('x', -padL)
        .attr('y', rectY)
        .attr('width', rectW)
        .attr('height', rectH)
        .attr('rx', 5)
        .attr('fill', () => {
          // Principals look like leaves regardless of expand state
          if (d.data._nodeType === 'principal') {
            return blendWithBg(getNodeColor(d), 0.15);
          }
          if (hasChildren(d) && !d.data.children) return '#1a1a2e';
          const c = getNodeColor(d);
          return blendWithBg(c, 0.15);
        })
        .attr('stroke', getNodeColor(d))
        .attr('stroke-width', d.data._nodeType === 'principal' ? 1.5 :
          (hasChildren(d) && !d.data.children) ? 1 : 1.5);

      // Store box width for link routing
      boxWidths.set(d, rectW);

      group.select('.node-label')
        .attr('x', textX)
        .attr('text-anchor', 'start');

      group.select('.node-subtitle')
        .attr('x', textX)
        .attr('text-anchor', 'start');

      // Store badge info for rendering on top of links later
      const type = d.data._nodeType;
      if (type === 'category' || type === 'subcategory' || type === 'intermediate' || type === 'principal') {
        const count = type === 'category'
          ? countDescendants(d.data)
          : (d.data._children || d.data.children || []).length;
        d._badgeInfo = {
          x: d.y + rectW - padL + 4,
          y: d.x + rectY + rectH / 2,
          count,
          color: getNodeColor(d),
        };
      }
    });

    // ── Links (drawn after nodes so we have box widths) ──
    g.selectAll('.link')
      .data(links, d => d.target.data.name + '|' + (d.target.parent ? d.target.parent.data.name : ''))
      .join('path')
      .attr('class', 'link')
      .attr('d', d => {
        const padL = 10;
        const sourceW = boxWidths.get(d.source) || 0;
        const sx = d.source.y + sourceW - padL;
        const sy = d.source.x;
        const tx = d.target.y - padL;
        const ty = d.target.x;
        const mx = (sx + tx) / 2;
        return `M${sx},${sy}C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
      })
      .attr('stroke', d => {
        // Find which hub (NIV/IV) this link belongs to
        let node = d.source;
        while (node.parent && node.data._nodeType !== 'hub') {
          node = node.parent;
        }
        if (node.data.name === 'NIV') return '#4fc3f744';
        if (node.data.name === 'IV') return '#ffb74d44';
        return '#555';
      })
      .attr('stroke-width', d => {
        // Thicker lines for deeper (more expanded) branches
        const depth = d.source.depth;
        if (depth <= 1) return 2;
        if (depth <= 2) return 1.5;
        return 1;
      });

    // ── Count badges (on top of links) ──
    g.selectAll('.badge').remove();
    const badgeNodes = nodes.filter(d => d._badgeInfo);
    const badges = g.selectAll('.badge')
      .data(badgeNodes)
      .join('g')
      .attr('class', 'badge')
      .attr('transform', d => `translate(${d._badgeInfo.x},${d._badgeInfo.y})`);

    badges.append('circle')
      .attr('r', 11)
      .attr('fill', '#1a1a2e')
      .attr('stroke', d => d._badgeInfo.color)
      .attr('stroke-width', 1);

    badges.append('text')
      .attr('dy', '0.35em')
      .attr('text-anchor', 'middle')
      .attr('fill', d => d._badgeInfo.color)
      .attr('font-size', '10px')
      .attr('font-weight', '700')
      .style('pointer-events', 'none')
      .text(d => d._badgeInfo.count);

    // Overlays
    g.selectAll('.arc-overlay').remove();
    drawArcOverlays(g);
  }

  svg.call(zoom.transform, d3.zoomIdentity.translate(w * 0.15, h / 2).scale(0.85));
  update(root);
}

// ── Radial Layout ──

function renderRadial(g, root, w, h, svg, zoom) {
  const radius = Math.min(w, h) / 2 - 120;
  const clusterLayout = d3.cluster().size([2 * Math.PI, radius]);

  function update() {
    const freshRoot = d3.hierarchy(root.data);
    clusterLayout(freshRoot);

    const nodes = freshRoot.descendants();
    const links = freshRoot.links();

    nodePositions = {};
    nodes.forEach(d => {
      const angle = d.x - Math.PI / 2;
      const r = d.y;
      const px = r * Math.cos(angle);
      const py = r * Math.sin(angle);
      if (d.data.nodeData) nodePositions[d.data.nodeData.id] = { x: px, y: py };
    });

    // Links
    const linkSel = g.selectAll('.link').data(links, d => d.target.data.name);
    linkSel.exit().remove();
    const linkEnter = linkSel.enter().append('path').attr('class', 'link');
    linkSel.merge(linkEnter)
      .attr('d', d3.linkRadial().angle(d => d.x).radius(d => d.y));

    // Nodes
    const nodeSel = g.selectAll('.node').data(nodes, d => d.data.name + (d.parent ? d.parent.data.name : ''));
    nodeSel.exit().remove();

    const nodeEnter = nodeSel.enter().append('g').attr('class', 'node');
    nodeEnter.append('circle').attr('class', 'node-hit').attr('fill', 'transparent').attr('r', 16);
    nodeEnter.append('circle').attr('class', 'node-circle');
    nodeEnter.append('text').attr('class', 'node-label');

    const nodeAll = nodeSel.merge(nodeEnter);

    nodeAll.attr('transform', d => {
      const angle = d.x - Math.PI / 2;
      const r = d.y;
      return `translate(${r * Math.cos(angle)},${r * Math.sin(angle)})`;
    });

    nodeAll.select('.node-hit')
      .attr('r', d => Math.max(getNodeRadius(d) + 8, 16))
      .style('cursor', 'pointer')
      .on('click', (event, d) => {
        event.stopPropagation();
        if (d.data.nodeData) {
          showDetail(d.data.nodeData);
          return;
        }
        if (d.data._nodeType !== 'root') {
          toggleNode(d, freshRoot);
          update();
        }
      });

    nodeAll.select('circle.node-circle')
      .attr('r', d => getNodeRadius(d))
      .attr('fill', d => {
        if (hasChildren(d) && !d.data.children) return 'none';
        return getNodeColor(d);
      })
      .attr('stroke', d => getNodeColor(d))
      .attr('stroke-width', d => hasChildren(d) && !d.data.children ? 2 : 0)
      .style('pointer-events', 'none');

    nodeAll.select('text')
      .attr('dy', '0.35em')
      .attr('x', d => {
        if (d.data._nodeType === 'root') return 0;
        const angle = d.x;
        const r = getNodeRadius(d) + 6;
        return angle < Math.PI ? r : -r;
      })
      .attr('text-anchor', d => {
        if (d.data._nodeType === 'root') return 'middle';
        return d.x < Math.PI ? 'start' : 'end';
      })
      .attr('transform', d => {
        if (d.data._nodeType === 'root' || d.data._nodeType === 'hub') return '';
        const angleDeg = (d.x * 180 / Math.PI) - 90;
        const flip = d.x >= Math.PI ? 180 : 0;
        return `rotate(${angleDeg + flip})`;
      })
      .attr('class', d => {
        if (d.data._nodeType === 'category' || d.data._nodeType === 'hub')
          return 'node-label node-label-category';
        if (d.data._nodeType === 'subcategory')
          return 'node-label node-label-subcategory';
        return 'node-label node-label-leaf';
      })
      .text(d => {
        if (d.data._nodeType === 'root') return 'INA';
        if (d.data._nodeType === 'hub') return d.data.name;
        if (d.data._nodeType === 'category') {
          const label = d.data.name;
          const count = countDescendants(d.data);
          return d.data.children ? label : `${label} (${count})`;
        }
        if (d.data._nodeType === 'subcategory') {
          const count = (d.data._children || []).length;
          return d.data.children ? d.data.name : `${d.data.name} (${count})`;
        }
        return d.data.name;
      });

    g.selectAll('.arc-overlay').remove();
    drawArcOverlays(g);
  }

  svg.call(zoom.transform, d3.zoomIdentity.translate(w / 2, h / 2).scale(0.75));
  update();
}

// ── Arc Overlays ──

function drawArcOverlays(g) {
  const showPathways = document.getElementById('toggle-pathways').checked;
  const showMultiparent = document.getElementById('toggle-multiparent').checked;

  if (!showPathways && !showMultiparent) return;

  for (const link of overlayLinks) {
    const s = nodePositions[link.source];
    const t = nodePositions[link.target];
    if (!s || !t) continue;

    if (link.type === 'pathway' && !showPathways) continue;
    if (link.type !== 'pathway' && !showMultiparent) continue;

    const dx = t.x - s.x;
    const dy = t.y - s.y;
    const dr = Math.sqrt(dx * dx + dy * dy) * 1.5;

    g.append('path')
      .attr('class', `arc-overlay ${link.type === 'pathway' ? 'arc-pathway' : 'arc-multiparent'}`)
      .attr('d', `M${s.x},${s.y}A${dr},${dr} 0 0,1 ${t.x},${t.y}`);
  }
}

// ── Detail Panel ──

function showCategoryDetail(d) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const type = d.data._nodeType;

  let title = '', subtitle = '', desc = '', law = '', color = '#888';

  if (type === 'root') {
    title = 'INA';
    subtitle = 'Immigration & Nationality Act of 1952, as amended';
    desc = 'The foundational federal law governing all immigration to the United States. Codified at 8 U.S.C. §1101 et seq. Defines all nonimmigrant classifications (§101(a)(15)), immigrant preferences (§203), and special immigrant categories (§101(a)(27)).';
    law = '8 U.S.C. §1101 et seq. (Public Law 82-414)';
    color = '#e0e0e0';
  } else if (type === 'hub') {
    color = HUB_COLORS[d.data.name];
    if (d.data.name === 'NIV') {
      title = 'NIV';
      subtitle = 'Nonimmigrant Visas';
      desc = 'Temporary visas for visitors, workers, students, diplomats, and others who intend to stay in the U.S. for a specific purpose and limited time. Defined in INA §101(a)(15), subparagraphs (A) through (V). Classification symbols per 22 CFR §41.12 and 9 FAM 402.1.';
      law = 'INA §101(a)(15) · 22 CFR Part 41';
    } else {
      title = 'IV';
      subtitle = 'Immigrant Visas';
      desc = 'Visas for persons seeking lawful permanent resident (LPR / green card) status. Includes immediate relatives (INA §201(b)), family preferences (INA §203(a)), employment preferences (INA §203(b)), diversity lottery (INA §203(c)), and special immigrants (INA §101(a)(27)). Classification symbols per 22 CFR §42.11 and 9 FAM 502.1.';
      law = 'INA §201–203 · 22 CFR Part 42';
    }
  } else if (type === 'category') {
    const fullCat = d.data._fullCategory;
    color = COLORS[fullCat] || '#888';
    title = d.data.name;
    subtitle = fullCat;
    desc = CATEGORY_DESCRIPTIONS[fullCat] || '';
    const count = countDescendants(d.data);
    desc += ` Contains ${count} visa classifications.`;
  } else if (type === 'subcategory') {
    color = COLORS[d.data._category] || '#888';
    title = d.data.name;
    subtitle = SUBCATEGORY_NAMES[d.data.name] || '';
    const count = (d.data._children || d.data.children || []).length;
    desc = `${count} visa classification${count !== 1 ? 's' : ''} in this family.`;
  }

  content.innerHTML = `
    <div class="detail-header">
      <span class="detail-id" style="color:${color}">${title}</span>
      <span class="detail-name">${subtitle}</span>
    </div>
    ${law ? `<div class="detail-row"><span class="detail-label">LAW</span><span class="detail-value">${law}</span></div>` : ''}
    <div class="detail-row"><span class="detail-label">ABOUT</span><span class="detail-value">${desc}</span></div>
  `;

  panel.style.borderTopColor = color;
  panel.classList.add('active');
}

function showDetail(nodeData) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const color = COLORS[nodeData.category] || '#888';

  // Find all links involving this node
  const inbound = rawData.links.filter(l => l.target === nodeData.id);
  const outbound = rawData.links.filter(l => l.source === nodeData.id);

  let linksHtml = '';
  if (inbound.length || outbound.length) {
    linksHtml = '<div class="detail-row"><span class="detail-label">CONNECTIONS</span></div><div class="detail-links">';
    for (const l of inbound) {
      linksHtml += `<span class="detail-link-chip ${l.relation_type}" onclick="navigateToNode('${l.source}')" title="${l.label}">&larr; ${l.source} <small>(${l.relation_type})</small></span>`;
    }
    for (const l of outbound) {
      linksHtml += `<span class="detail-link-chip ${l.relation_type}" onclick="navigateToNode('${l.target}')" title="${l.label}">${l.target} &rarr; <small>(${l.relation_type})</small></span>`;
    }
    linksHtml += '</div>';
  }

  let dhsHtml = '';
  if (nodeData.dhs_codes && nodeData.dhs_codes.length) {
    dhsHtml = `<div class="detail-row"><span class="detail-label">DHS CODES</span><span class="detail-value">${nodeData.dhs_codes.join(', ')}</span></div>`;
  }

  // Build reference links
  const lawText = nodeData.law || '';
  let refsHtml = '<div class="detail-refs">';
  if (nodeData.group === 'NIV') {
    refsHtml += `<a class="ref-link" href="https://travel.state.gov/content/travel/en/us-visas/visa-information-resources/all-visa-categories.html" target="_blank">DoS Visa Categories</a>`;
  } else {
    refsHtml += `<a class="ref-link" href="https://ohss.dhs.gov/topics/immigration/lawful-permanent-residents/immigrant-classes-admission" target="_blank">DHS Classes</a>`;
  }
  refsHtml += `<a class="ref-link" href="https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title8-section1101&num=0" target="_blank">8 U.S.C. &sect;1101</a>`;
  refsHtml += '</div>';

  content.innerHTML = `
    <div class="detail-header">
      <span class="detail-id" style="color:${color}">${nodeData.id}</span>
      <span class="detail-name">${nodeData.name}</span>
    </div>
    <div class="detail-row"><span class="detail-label">LAW</span><span class="detail-value">${nodeData.law}</span></div>
    <div class="detail-row"><span class="detail-label">GROUP</span><span class="detail-value">${nodeData.group} &mdash; ${nodeData.category}</span></div>
    <div class="detail-row"><span class="detail-label">FAMILY</span><span class="detail-value">${nodeData.subcategory}</span></div>
    <div class="detail-row"><span class="detail-label">ABOUT</span><span class="detail-value">${nodeData.description}</span></div>
    ${dhsHtml}
    ${linksHtml}
    ${refsHtml}
  `;

  panel.style.borderTopColor = color;
  panel.classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('active');
  selectedLeafId = null;
  render();
}

function navigateToNode(nodeId) {
  searchAndExpand(nodeId);
}

// ── Helpers ──

function countDescendants(d) {
  const children = d._children || d.children || [];
  let count = 0;
  for (const c of children) {
    if (c.nodeData) count++;
    else count += countDescendants(c);
  }
  return count;
}

// ── Legend ──

function buildLegend() {
  const legend = document.getElementById('legend');
  let html = '<h3>NIV (Nonimmigrant)</h3>';
  for (const [cat, color] of Object.entries(COLORS)) {
    if (!cat.startsWith('NIV')) continue;
    const label = cat.replace('NIV — ', '');
    html += `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${label}</div>`;
  }
  html += '<h3>IV (Immigrant)</h3>';
  for (const [cat, color] of Object.entries(COLORS)) {
    if (!cat.startsWith('IV')) continue;
    const label = cat.replace('IV — ', '');
    html += `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${label}</div>`;
  }
  html += '<h3>Overlays</h3>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:#ff7043"></span>Pathway (NIV&rarr;IV)</div>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:#888"></span>Multi-Parent</div>';
  legend.innerHTML = html;
}

// ── Event Handlers ──

function expandAllNodes(d) {
  if (d._children) {
    d.children = d._children;
  }
  if (d.children) {
    d.children.forEach(c => expandAllNodes(c));
  }
}

function collapseAllNodes(d) {
  if (d.children && d._nodeType !== 'hub' && d._nodeType !== 'root') {
    d._children = d.children;
    d.children = null;
  }
  if (d._children) {
    d._children.forEach(c => collapseAllNodes(c));
  }
}

// ── Search ──

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', () => {
  searchClear.style.display = searchInput.value ? 'block' : 'none';
});
searchClear.addEventListener('click', () => {
  clearSearch();
});

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q || !rawData) {
    searchResults.style.display = 'none';
    searchResults.innerHTML = '';
    return;
  }
  const matches = rawData.nodes.filter(n =>
    n.id.toLowerCase().includes(q) ||
    n.name.toLowerCase().includes(q)
  ).slice(0, 15);

  if (matches.length === 0) {
    searchResults.style.display = 'none';
    return;
  }

  searchResults.innerHTML = matches.map(n =>
    `<div class="search-item" data-id="${n.id}"><span class="si-code">${n.id}</span><span class="si-name">${n.name}</span></div>`
  ).join('');
  searchResults.style.display = 'block';

  searchResults.querySelectorAll('.search-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      searchAndExpand(id);
      clearSearch();
    });
  });
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') clearSearch();
  if (e.key === 'Enter') {
    const first = searchResults.querySelector('.search-item');
    if (first) {
      searchAndExpand(first.dataset.id);
      clearSearch();
    }
  }
});

function clearSearch() {
  searchInput.value = '';
  searchResults.style.display = 'none';
  searchResults.innerHTML = '';
  searchClear.style.display = 'none';
}

function searchAndExpand(visaId) {
  if (!rawData || !currentRootData) return;

  const node = rawData.nodes.find(n => n.id === visaId);
  if (!node) return;

  selectedLeafId = visaId;
  expandPathTo(currentRootData, visaId);
  render();
  showDetail(node);

  // Center on the found node
  centerOnNode(visaId);
}

function centerOnNode(visaId) {
  const pos = nodePositions[visaId];
  if (!pos || !currentSvg || !currentZoom) return;

  const container = document.getElementById('canvas-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  const scale = 0.85;

  // Position node at right-center: 70% across, 50% down
  const tx = w * 0.7 - pos.x * scale;
  const ty = h * 0.5 - pos.y * scale;

  currentSvg.transition().duration(600)
    .call(currentZoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function expandPathTo(treeNode, targetId) {
  // If this node IS the target leaf, we found it
  if (treeNode.nodeData && treeNode.nodeData.id === targetId) return true;

  const kids = treeNode._children || treeNode.children || [];
  for (const child of kids) {
    if (expandPathTo(child, targetId)) {
      // This ancestor is on the path — expand it
      if (treeNode._children) {
        treeNode.children = treeNode._children;
      }
      return true;
    }
  }
  return false;
}

// Clear search when clicking any node on the tree
document.getElementById('viz').addEventListener('click', () => {
  if (searchInput.value) clearSearch();
});

// ── Expand / Collapse ──

document.getElementById('btn-expand').addEventListener('click', () => {
  if (!currentRootData) return;
  window._expandAllActive = true;
  expandAllNodes(currentRootData);
  render();
});

// Re-enable accordion on any manual click (after expand all)
document.getElementById('viz').addEventListener('click', () => {
  window._expandAllActive = false;
});

document.getElementById('btn-collapse').addEventListener('click', () => {
  if (!rawData) return;
  currentRootData = null; // reset to fresh collapsed state
  render();
  closeDetail();
});

document.getElementById('layout-select').addEventListener('change', e => {
  currentLayout = e.target.value;
  closeDetail();
  render();
});

document.getElementById('toggle-pathways').addEventListener('change', () => render());
document.getElementById('toggle-multiparent').addEventListener('change', () => render());

window.addEventListener('resize', () => render());
</script>
