<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visa Mill — Theme Preview</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0d14;
  color: #c8cdd8;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  min-height: 100vh;
  padding: 40px 32px 80px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, #4fc3f708 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, #ffb74d06 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.page-header {
  text-align: center;
  margin-bottom: 48px;
  position: relative;
  z-index: 1;
}

.page-header h1 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #6b7394;
  margin-bottom: 8px;
}

.page-header p {
  font-size: 12px;
  color: #4a5470;
  letter-spacing: 0.5px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

@media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

/* ── Theme Card ── */
.theme-card {
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  cursor: default;
  position: relative;
}

.theme-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 60px -10px rgba(0,0,0,0.5);
}

.theme-card.active::after {
  content: 'CURRENT';
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  z-index: 10;
}

/* ── Mini App Mockup ── */
.mockup {
  height: 280px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.mock-toolbar {
  height: 32px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
}

.mock-toolbar .title {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.6;
}

.mock-toolbar .spacer { flex: 1; }

.mock-toolbar .btn {
  font-size: 7px;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 600;
  opacity: 0.7;
}

.mock-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.mock-tree {
  flex: 1;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  justify-content: center;
}

.mock-node {
  padding: 6px 10px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  border-width: 1px;
  border-style: solid;
}

.mock-node .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.mock-node .sub {
  font-size: 7px;
  opacity: 0.5;
  margin-left: auto;
}

.mock-panel {
  width: 140px;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
}

.mock-panel .visa-code {
  font-family: 'DM Mono', monospace;
  font-size: 18px;
  font-weight: 500;
}

.mock-panel .visa-name {
  font-size: 8px;
  opacity: 0.6;
  line-height: 1.4;
}

.mock-panel .label {
  font-size: 7px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.35;
  margin-bottom: 2px;
}

.mock-panel .value {
  font-size: 8px;
  opacity: 0.6;
  line-height: 1.4;
}

.mock-panel .link {
  font-size: 8px;
  text-decoration: none;
}

/* ── Card Footer ── */
.card-footer {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card-footer .theme-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.card-footer .theme-desc {
  font-size: 10px;
  opacity: 0.5;
  line-height: 1.5;
}

.color-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.color-row .swatch {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  position: relative;
  transition: transform 0.15s;
}

.color-row .swatch:hover {
  transform: scale(1.3);
  z-index: 2;
}

.color-row .swatch::after {
  content: attr(data-label);
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 6px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}

.color-row .swatch:hover::after { opacity: 0.6; }

.color-sections {
  display: flex;
  gap: 12px;
}

.color-sections .section-label {
  font-size: 7px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.3;
  margin-bottom: 4px;
}

/* ══════════════════════════════════════════
   THEME DEFINITIONS
   ══════════════════════════════════════════ */

/* ── 1. Navy Dark (Current) ── */
.t-navy .mockup { background: #111827; }
.t-navy .mock-toolbar { background: #1a2235; border-bottom: 1px solid #1e2740; }
.t-navy .mock-toolbar .title { color: #8892a8; }
.t-navy .mock-toolbar .btn { background: #111827; color: #8892a8; border: 1px solid #1e2740; }
.t-navy .mock-tree { background: #111827; }
.t-navy .mock-node { background: #1a2235; border-color: #2a3654; color: #e8ecf4; }
.t-navy .mock-node .sub { color: #4a5470; }
.t-navy .mock-panel { background: #1a2235; border-left: 1px solid #1e2740; }
.t-navy .mock-panel .visa-code { color: #4fc3f7; }
.t-navy .mock-panel .visa-name { color: #8892a8; }
.t-navy .mock-panel .label { color: #4a5470; }
.t-navy .mock-panel .value { color: #8892a8; }
.t-navy .mock-panel .link { color: #4fc3f7; }
.t-navy .card-footer { background: #0e1525; }
.t-navy .card-footer .theme-name { color: #e8ecf4; }
.t-navy .card-footer .theme-desc { color: #6b7394; }
.t-navy.active::after { background: #4fc3f720; color: #4fc3f7; }

/* ── 2. Light ── */
.t-light .mockup { background: #f5f6f8; }
.t-light .mock-toolbar { background: #ffffff; border-bottom: 1px solid #e2e5ec; }
.t-light .mock-toolbar .title { color: #6b7280; }
.t-light .mock-toolbar .btn { background: #f0f1f4; color: #6b7280; border: 1px solid #e2e5ec; }
.t-light .mock-tree { background: #f5f6f8; }
.t-light .mock-node { background: #ffffff; border-color: #e2e5ec; color: #1f2937; }
.t-light .mock-node .sub { color: #9ca3af; }
.t-light .mock-panel { background: #ffffff; border-left: 1px solid #e2e5ec; }
.t-light .mock-panel .visa-code { color: #2563eb; }
.t-light .mock-panel .visa-name { color: #6b7280; }
.t-light .mock-panel .label { color: #9ca3af; }
.t-light .mock-panel .value { color: #4b5563; }
.t-light .mock-panel .link { color: #2563eb; }
.t-light .card-footer { background: #ebedf2; }
.t-light .card-footer .theme-name { color: #1f2937; }
.t-light .card-footer .theme-desc { color: #6b7280; }
.t-light.active::after { background: #2563eb20; color: #2563eb; }

/* ── 3. High Contrast ── */
.t-hc .mockup { background: #000000; }
.t-hc .mock-toolbar { background: #0a0a0a; border-bottom: 2px solid #333; }
.t-hc .mock-toolbar .title { color: #ffffff; }
.t-hc .mock-toolbar .btn { background: #000; color: #fff; border: 1px solid #555; }
.t-hc .mock-tree { background: #000000; }
.t-hc .mock-node { background: #0a0a0a; border-color: #444; color: #ffffff; border-width: 2px; }
.t-hc .mock-node .sub { color: #999; }
.t-hc .mock-panel { background: #0a0a0a; border-left: 2px solid #444; }
.t-hc .mock-panel .visa-code { color: #00e5ff; }
.t-hc .mock-panel .visa-name { color: #ccc; }
.t-hc .mock-panel .label { color: #888; }
.t-hc .mock-panel .value { color: #ddd; }
.t-hc .mock-panel .link { color: #00e5ff; }
.t-hc .card-footer { background: #0a0a0a; }
.t-hc .card-footer .theme-name { color: #ffffff; }
.t-hc .card-footer .theme-desc { color: #999; }
.t-hc.active::after { background: #00e5ff30; color: #00e5ff; }

/* ── 4. Colorblind Safe ── */
.t-cb .mockup { background: #1a1a2e; }
.t-cb .mock-toolbar { background: #222244; border-bottom: 1px solid #333366; }
.t-cb .mock-toolbar .title { color: #9999bb; }
.t-cb .mock-toolbar .btn { background: #1a1a2e; color: #9999bb; border: 1px solid #333366; }
.t-cb .mock-tree { background: #1a1a2e; }
.t-cb .mock-node { background: #222244; border-color: #444466; color: #e0e0f0; }
.t-cb .mock-node .sub { color: #7777aa; }
.t-cb .mock-panel { background: #222244; border-left: 1px solid #333366; }
.t-cb .mock-panel .visa-code { color: #56b4e9; }
.t-cb .mock-panel .visa-name { color: #9999bb; }
.t-cb .mock-panel .label { color: #7777aa; }
.t-cb .mock-panel .value { color: #bbbbdd; }
.t-cb .mock-panel .link { color: #56b4e9; }
.t-cb .card-footer { background: #151530; }
.t-cb .card-footer .theme-name { color: #e0e0f0; }
.t-cb .card-footer .theme-desc { color: #7777aa; }
.t-cb.active::after { background: #56b4e920; color: #56b4e9; }

/* ── 5. Solarized Dark ── */
.t-sol .mockup { background: #002b36; }
.t-sol .mock-toolbar { background: #073642; border-bottom: 1px solid #0a4a58; }
.t-sol .mock-toolbar .title { color: #839496; }
.t-sol .mock-toolbar .btn { background: #002b36; color: #839496; border: 1px solid #0a4a58; }
.t-sol .mock-tree { background: #002b36; }
.t-sol .mock-node { background: #073642; border-color: #0a4a58; color: #fdf6e3; }
.t-sol .mock-node .sub { color: #657b83; }
.t-sol .mock-panel { background: #073642; border-left: 1px solid #0a4a58; }
.t-sol .mock-panel .visa-code { color: #268bd2; }
.t-sol .mock-panel .visa-name { color: #93a1a1; }
.t-sol .mock-panel .label { color: #657b83; }
.t-sol .mock-panel .value { color: #93a1a1; }
.t-sol .mock-panel .link { color: #268bd2; }
.t-sol .card-footer { background: #00232d; }
.t-sol .card-footer .theme-name { color: #fdf6e3; }
.t-sol .card-footer .theme-desc { color: #657b83; }
.t-sol.active::after { background: #268bd230; color: #268bd2; }

/* ── 6. Government ── */
.t-gov .mockup { background: #f0f0f0; }
.t-gov .mock-toolbar { background: #003366; border-bottom: 2px solid #002244; }
.t-gov .mock-toolbar .title { color: #ffffff; }
.t-gov .mock-toolbar .btn { background: #004488; color: #fff; border: 1px solid #005599; }
.t-gov .mock-tree { background: #f0f0f0; }
.t-gov .mock-node { background: #ffffff; border-color: #c8c8c8; color: #333333; }
.t-gov .mock-node .sub { color: #888; }
.t-gov .mock-panel { background: #ffffff; border-left: 1px solid #c8c8c8; }
.t-gov .mock-panel .visa-code { color: #003366; }
.t-gov .mock-panel .visa-name { color: #555555; }
.t-gov .mock-panel .label { color: #999999; }
.t-gov .mock-panel .value { color: #555555; }
.t-gov .mock-panel .link { color: #0050a0; }
.t-gov .card-footer { background: #e4e4e4; }
.t-gov .card-footer .theme-name { color: #333333; }
.t-gov .card-footer .theme-desc { color: #777777; }
.t-gov.active::after { background: #00336620; color: #003366; }

</style>
</head>
<body>

<div class="page-header">
  <h1>Visa Mill &mdash; Theme Preview</h1>
  <p>6 themes for the U.S. Visa Classification System visualizer</p>
</div>

<div class="grid" id="grid"></div>

<script>
const themes = [
  {
    id: 'navy', cls: 't-navy', name: 'Navy Dark', active: true,
    desc: 'Current theme. Deep navy background with blue NIV and amber IV accents.',
    niv: ['#4fc3f7','#81d4fa','#29b6f6','#4dd0e1','#80cbc4','#a5d6a7'],
    iv: ['#ffb74d','#ffa726','#ff8a65','#ce93d8','#ef9a9a','#fff176','#b0bec5'],
    accent: '#4fc3f7', ivAccent: '#ffb74d',
    nodeBg: '#1a2235', nodeBorder: '#2a3654',
  },
  {
    id: 'light', cls: 't-light', name: 'Light',
    desc: 'Clean white background. Deeper saturated accents for readability in bright environments.',
    niv: ['#2563eb','#3b82f6','#0ea5e9','#0891b2','#0d9488','#059669'],
    iv: ['#d97706','#ea580c','#dc2626','#9333ea','#e11d48','#ca8a04','#6b7280'],
    accent: '#2563eb', ivAccent: '#d97706',
    nodeBg: '#ffffff', nodeBorder: '#e2e5ec',
  },
  {
    id: 'hc', cls: 't-hc', name: 'High Contrast',
    desc: 'True black background with vivid neon accents. Maximum readability, WCAG AAA compliant.',
    niv: ['#00e5ff','#40c4ff','#18ffff','#64ffda','#69f0ae','#b2ff59'],
    iv: ['#ffab00','#ff6d00','#ff3d00','#ea80fc','#ff5252','#ffff00','#ffffff'],
    accent: '#00e5ff', ivAccent: '#ffab00',
    nodeBg: '#0a0a0a', nodeBorder: '#444444',
  },
  {
    id: 'cb', cls: 't-cb', name: 'Colorblind Safe',
    desc: 'Wong palette. Avoids red-green confusion. Uses blue/orange primary axis with distinct shapes.',
    niv: ['#56b4e9','#009e73','#0072b2','#56b4e9','#009e73','#999999'],
    iv: ['#e69f00','#d55e00','#cc79a7','#f0e442','#cc79a7','#e69f00','#999999'],
    accent: '#56b4e9', ivAccent: '#e69f00',
    nodeBg: '#222244', nodeBorder: '#444466',
  },
  {
    id: 'sol', cls: 't-sol', name: 'Solarized Dark',
    desc: 'Ethan Schoonover\'s Solarized palette. Scientifically calibrated for long reading sessions.',
    niv: ['#268bd2','#2aa198','#859900','#6c71c4','#2aa198','#859900'],
    iv: ['#cb4b16','#dc322f','#d33682','#b58900','#dc322f','#b58900','#93a1a1'],
    accent: '#268bd2', ivAccent: '#cb4b16',
    nodeBg: '#073642', nodeBorder: '#0a4a58',
  },
  {
    id: 'gov', cls: 't-gov', name: 'Government',
    desc: 'Institutional style matching DOS/DHS branding. Navy toolbar, light body, muted palette.',
    niv: ['#003366','#005599','#0077b6','#2a9d8f','#48839e','#6b8e7b'],
    iv: ['#8b4513','#a0522d','#b22234','#6a4c93','#c7372f','#9e7c0c','#708090'],
    accent: '#003366', ivAccent: '#8b4513',
    nodeBg: '#ffffff', nodeBorder: '#c8c8c8',
  },
];

const mockNodes = [
  { code: 'H-1B', name: 'Specialty Occupation', cat: 'niv', idx: 2 },
  { code: 'L-1A', name: 'Intracompany Transfer', cat: 'niv', idx: 0 },
  { code: 'F-1',  name: 'Academic Student', cat: 'niv', idx: 3 },
  { code: 'EB-1', name: 'Priority Workers', cat: 'iv', idx: 0 },
  { code: 'DV-1', name: 'Diversity Lottery', cat: 'iv', idx: 3 },
];

function renderCard(t) {
  const nodesHtml = mockNodes.map(n => {
    const colors = n.cat === 'niv' ? t.niv : t.iv;
    const c = colors[n.idx % colors.length];
    return `<div class="mock-node" style="border-color:${c}40;background:${t.nodeBg}">
      <span class="dot" style="background:${c}"></span>
      ${n.code} <span class="sub">${n.name}</span>
    </div>`;
  }).join('');

  const nivSwatches = t.niv.map((c,i) =>
    `<span class="swatch" style="background:${c}" data-label="NIV-${i+1}"></span>`
  ).join('');
  const ivSwatches = t.iv.map((c,i) =>
    `<span class="swatch" style="background:${c}" data-label="IV-${i+1}"></span>`
  ).join('');

  return `
    <div class="theme-card ${t.cls}${t.active ? ' active' : ''}">
      <div class="mockup">
        <div class="mock-toolbar">
          <span class="title">U.S. Visa Classification</span>
          <span class="spacer"></span>
          <span class="btn">Expand</span>
          <span class="btn">Reference</span>
        </div>
        <div class="mock-body">
          <div class="mock-tree">${nodesHtml}</div>
          <div class="mock-panel">
            <div class="visa-code" style="color:${t.accent}">H-1B</div>
            <div class="visa-name">Specialty Occupation Worker</div>
            <div>
              <div class="label">FAM</div>
              <div class="link" style="color:${t.accent}">9 FAM 402.10-4(B)</div>
            </div>
            <div>
              <div class="label">Law</div>
              <div class="link" style="color:${t.accent}">INA &sect;101(a)(15)(H)</div>
            </div>
            <div>
              <div class="label">Classification</div>
              <div class="value">NIV &mdash; Worker</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="theme-name">${t.name}</div>
        <div class="theme-desc">${t.desc}</div>
        <div class="color-sections">
          <div>
            <div class="section-label">NIV</div>
            <div class="color-row">${nivSwatches}</div>
          </div>
          <div>
            <div class="section-label">IV</div>
            <div class="color-row">${ivSwatches}</div>
          </div>
        </div>
      </div>
    </div>`;
}

document.getElementById('grid').innerHTML = themes.map(renderCard).join('');
</script>

</body>
</html>
